name: Deploy to Google Play Store

on:
  workflow_run:
    workflows: ["Build APK with EAS"]
    types:
      - completed
  workflow_dispatch:

jobs:
  deploy:
    runs-on: ubuntu-latest
    if: github.event.workflow_run.conclusion == 'success' || github.event_name == 'workflow_dispatch'
    
    steps:
      - uses: actions/checkout@v4
      
      - name: Download APK from Build Workflow
        uses: actions/download-artifact@v4
        with:
          name: oilnow-plus-apk
          path: ./
        continue-on-error: true
      
      - name: Setup Java
        uses: actions/setup-java@v4
        with:
          distribution: 'temurin'
          java-version: '17'
      
      - name: Setup Android SDK
        uses: android-actions/setup-android@v3
      
      - name: Decode Google Play Service Account
        run: |
          echo "${{ secrets.GOOGLE_PLAY_SERVICE_ACCOUNT }}" | base64 -d > service-account.json
        continue-on-error: true
      
      - name: Upload to Google Play Internal Testing
        uses: r0adkll/upload-google-play@v1
        if: hashFiles('service-account.json') != ''
        with:
          serviceAccountJsonPlainText: ${{ secrets.GOOGLE_PLAY_SERVICE_ACCOUNT }}
          packageName: com.oilnowplus.app
          releaseFiles: 'app.apk'
          track: internal
          status: completed
        continue-on-error: true
      
      - name: Notify Deployment Status
        run: |
          echo "APK deployment completed!"
          echo "Track: Internal Testing"
          echo "Package: com.oilnowplus.app"
